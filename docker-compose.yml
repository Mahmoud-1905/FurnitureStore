version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: furniture_db
    environment:
      SA_PASSWORD: "YourPassword123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - furniture-network

  app:
    build: .
    container_name: furniture_app
    environment:
      ConnectionStrings__Default: "Server=sqlserver;Database=NEWUserRoles;User=sa;Password=YourPassword123!;MultipleActiveResultSets=true;TrustServerCertificate=true"
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
    networks:
      - furniture-network

volumes:
  sqlserver_data:

networks:
  furniture-network:
    driver: bridge
